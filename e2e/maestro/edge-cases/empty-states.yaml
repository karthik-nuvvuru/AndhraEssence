# Edge Case Tests - Empty States
appId: com.andhraessence.app
name: TC-EDGE-EMPTY-001 Cart Empty State
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - tapOn: { id: tab-cart }
  - waitFor: { id: screen-cart, timeout: 5000 }
  - assertVisible: { id: screen-cart }
  - assertVisible: { id: btn-start-ordering }
  - takeScreenshot: { name: edge-cart-empty }

---
appId: com.andhraessence.app
name: TC-EDGE-EMPTY-002 Search No Results
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
