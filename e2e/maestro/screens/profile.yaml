# Profile Screen Tests
appId: com.andhraessence.app
name: TC-PROFILE-001 Profile Screen Renders User Info
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - tapOn: { id: tab-profile }
  - waitFor: { id: screen-profile, timeout: 5000 }
  - assertVisible: { id: screen-profile }
  - assertVisible: { id: avatar-user }
  - assertVisible: { id: text-user-name }
  - assertVisible: { id: text-user-email }
  - takeScreenshot: { name: profile-screen }

