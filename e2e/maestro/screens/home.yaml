# Home Screen Tests
appId: com.andhraessence.app
name: TC-HOME-001 Home Screen Renders Search Bar
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - assertVisible: { id: btn-search }
  - takeScreenshot: { name: home-search-bar }

