# Register Screen Tests
appId: com.andhraessence.app
name: TC-REG-001 Register Screen Renders All Fields
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: btn-signup-link }
  - waitFor: { id: screen-register, timeout: 5000 }
  - assertVisible: { id: input-fullname }
  - assertVisible: { id: input-register-email }
  - assertVisible: { id: input-phone }
  - assertVisible: { id: input-register-password }
  - assertVisible: { id: input-confirm-password }
  - assertVisible: { id: btn-create-account }
  - takeScreenshot: { name: register-screen }

---
appId: com.andhraessence.app
