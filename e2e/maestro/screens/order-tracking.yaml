# Order Tracking Screen Tests
appId: com.andhraessence.app
name: TC-TRACK-001 Order Tracking Screen Renders
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - wait: 2000
  - tapOn: { id: card-restaurant-0 }
  - waitFor: { id: screen-restaurant, timeout: 5000 }
  - wait: 1000
  - tapOn: { id: btn-add-item-0 }
  - wait: 500
  - tapOn: { id: tab-cart }
  - waitFor: { id: screen-cart, timeout: 5000 }
  - tapOn: { id: btn-checkout }
  - waitFor: { id: screen-checkout, timeout: 5000 }
  - scrollDown
  - tapOn: { id: btn-place-order }
  - waitFor: { id: screen-order-tracking, timeout: 15000 }
  - assertVisible: { id: screen-order-tracking }
  - takeScreenshot: { name: tracking-screen }

