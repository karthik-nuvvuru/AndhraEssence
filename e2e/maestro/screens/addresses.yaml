# Addresses Screen Tests
appId: com.andhraessence.app
name: TC-ADDR-001 Addresses Screen Renders
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - tapOn: { id: tab-profile }
  - waitFor: { id: screen-profile, timeout: 5000 }
  - scrollDown
  - tapOn: { id: btn-my-addresses }
  - waitFor: { id: screen-addresses, timeout: 5000 }
  - assertVisible: { id: screen-addresses }
  - takeScreenshot: { name: addresses-screen }

