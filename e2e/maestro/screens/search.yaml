# Search Screen Tests
appId: com.andhraessence.app
name: TC-SEARCH-001 Search Screen Renders With Input
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - tapOn: { id: btn-search }
  - waitFor: { id: screen-search, timeout: 5000 }
  - assertVisible: { id: input-search }
  - takeScreenshot: { name: search-screen }

