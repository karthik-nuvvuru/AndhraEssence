# Login Screen Tests
appId: com.andhraessence.app
name: TC-LOGIN-001 Login Screen Renders
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - assertVisible: { id: screen-login }
  - assertVisible: { id: input-email }
  - assertVisible: { id: input-password }
  - assertVisible: { id: btn-signin }
  - assertVisible: { text: "Sign In" }
  - takeScreenshot: { name: login-screen }

---
appId: com.andhraessence.app
name: TC-LOGIN-002 Email Validation Shows Error For Empty
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ""
  - tapOn: { id: input-password }
  - tapOn: { id: btn-signin }
  - wait: 500
  - assertVisible: { text: "Email is required" }
  - takeScreenshot: { name: login-empty-email }

---
appId: com.andhraessence.app
