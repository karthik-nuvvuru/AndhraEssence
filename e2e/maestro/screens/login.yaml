---
appId: com.andhraessence.app
name: TC-LOGIN-007 Successful Login With Valid Credentials
env:
  EMAIL: customer@example.com
  PASSWORD: customer123
actions:
  - launchApp
  - waitFor: { id: screen-login, timeout: 8000 }
  - tapOn: { id: input-email }
  - inputText: ${EMAIL}
  - tapOn: { id: input-password }
  - inputText: ${PASSWORD}
  - tapOn: { id: btn-signin }
  - waitFor: { id: screen-home, timeout: 12000 }
  - takeScreenshot: { name: login-success }
  - assertVisible: { id: screen-home }

